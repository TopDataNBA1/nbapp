    <script>
        function openTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            document.querySelector(`button[onclick="openTab('${tabName}')"]`).classList.add('active');
            if (tabName === 'live') updatePage();
            if (tabName === 'telegram') updateMoves();
        }

        const statNames = {pts:"NBA All-Time Points",trb:"NBA All-Time Rebounds",ast:"NBA All-Time Assists",stl:"NBA All-Time Steals",blk:"NBA All-Time Blocks",fg3:"NBA All-Time Three-Pointers",g:"NBA All-Time Games Played"};

        function getTimes() {
            const now = new Date();
            const cest = now.toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'Europe/Paris'});
            const est = now.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true,timeZone:'America/New_York'});
            return {cest, est};
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const filter = this.getAttribute('data-filter');
                if (filter === 'all') {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                } else {
                    document.querySelector('[data-filter="all"]').classList.remove('active');
                    if (filter === 'top25') document.querySelector('[data-filter="top100"]')?.classList.remove('active');
                    if (filter === 'top100') document.querySelector('[data-filter="top25"]')?.classList.remove('active');
                    this.classList.toggle('active');
                }
                updatePage();
            });
        });

        function getActiveFilters() {
            return {
                top25: document.querySelector('[data-filter="top25"]').classList.contains('active'),
                top100: document.querySelector('[data-filter="top100"]').classList.contains('active'),
                playing: document.querySelector('[data-filter="playing"]').classList.contains('active'),
                almost: document.querySelector('[data-filter="almost"]').classList.contains('active'),
                all: document.querySelector('[data-filter="all"]').classList.contains('active')
            };
        }

        function updatePage() {
            const {cest, est} = getTimes();
            document.getElementById('clock-line').textContent = `${est} ET • ${cest} CEST`;

            fetch('data.json?v=' + new Date().getTime())
                .then(r => r.ok ? r.json() : Promise.reject())
                .then(data => {
                    const tablesDiv = document.getElementById('tables');
                    tablesDiv.innerHTML = '';
                    const filters = getActiveFilters();

                    for (const [stat, tabla] of Object.entries(data.tablas || {})) {
                        if (!tabla.length) continue;

                        let filtered = tabla.filter(row => {
                            const rank = row.Rank;
                            const gameStatus = String(row.game_status || '').toLowerCase();
                            const hoy = row.Hoy ?? 0;
                            const diff = (row.Diff ?? '').toString().trim() || '0';

                            // FILTROS EXISTENTES
                            if (filters.top25 && rank > 25) return false;
                            if (filters.top100 && !filters.top25 && rank > 100) return false;
                            if (filters.playing && gameStatus !== 'playing') return false;

                            // FILTRO "ALMOST" – CON EXCEPCIÓN PERFECTA PARA GAMES PLAYED
                            if (filters.almost) {
                                if (stat === 'g') {
                                    // En Games Played: solo los que NO han jugado hoy (Hoy=0) y están a 0 del de arriba
                                    if (hoy !== 0 || !['0'].includes(diff)) return false;
                                } else {
                                    // En el resto de stats: como antes (a 0-1-2-3 del de arriba y jugando o no empezado)
                                    const isPlayingOrNotStarted = (gameStatus === 'playing' || gameStatus === 'not_started');
                                    const near = (stat === 'pts') ? ['0','1','2'] : ['0'];
                                    if (!isPlayingOrNotStarted || !near.includes(diff)) return false;
                                }
                            }

                            if (filters.all || (!filters.top25 && !filters.top100 && !filters.playing && !filters.almost)) return true;
                            return true;
                        });

                        if (filtered.length === 0) continue;

                        const card = document.createElement('div'); card.className = 'card';
                        card.innerHTML = `<h2>${statNames[stat]}</h2><table><thead><tr><th>Rank</th><th>Player</th><th>Team</th><th>Today</th><th>Total</th><th>Diff</th><th>Ahead Of</th></tr></thead><tbody></tbody></table>`;
                        const tbody = card.querySelector('tbody');

                        filtered.forEach(row => {
                            const hoy = row.Hoy ?? 0;
                            const diff = (row.Diff ?? '').toString().trim() || '0';
                            const gameStatus = String(row.game_status || '').toLowerCase();
                            const isInactive = (gameStatus === 'inactive');

                            const isPoints = stat === 'pts';
                            const isGames = stat === 'g';
                            const near = isPoints ? ['0','1','2','3'] : ['0','1'];
                            const mustBlinkNormal = (gameStatus === 'playing' || gameStatus === 'not_started') && near.includes(diff) && !isInactive;
                            const mustBlinkGames = isGames && (gameStatus === 'playing' || gameStatus === 'not_started') && hoy === 0 && near.includes(diff);
                            const mustBlink = isGames ? mustBlinkGames : mustBlinkNormal;

                            let todayStyle = '';
                            if (isInactive) todayStyle = 'color:#ff5555';             // rojo
                            else if (gameStatus === 'finished') todayStyle = 'color:white';
                            else if (gameStatus === 'playing') todayStyle = 'color:#ffaa00;font-weight:900;text-shadow:0 0 12px #ffaa00';
                            else todayStyle = 'color:#888';                           // not_started

                            const tr = document.createElement('tr');
                            tr.innerHTML = `
                                <td class="rank">${row.Rank}</td>
                                <td class="player">${row.Nombre}</td>
                                <td class="team">${row.Team}</td>
                                <td class="today" style="${todayStyle}">${hoy}</td>
                                <td class="number"><strong>${Number(row.Total).toLocaleString()}</strong></td>
                                <td class="diff number${mustBlink?' diff-blink':''}">${diff}</td>
                                <td>${row.Antece||'-'}</td>`;
                            tbody.appendChild(tr);
                        });
                        tablesDiv.appendChild(card);
                    }
                });
        }

        // Función para convertir timestamp → "5m ago", "2h ago", "now", etc.
        function timeAgo(ts) {
            const now = Date.now() / 1000;
            const diff = Math.floor(now - ts);

            if (diff < 60) return "now";
            if (diff < 3600) return Math.floor(diff / 60) + "m ago";
            if (diff < 86400) return Math.floor(diff / 3600) + "h ago";

}

        };

        // === EMOJIS CONFIG (solo 4) ===
        const emojiList = [
            {key: 'fire', em: '🔥'},
            {key: 'goat', em: '🐐'},
            {key: 'clap', em: '👏'},
            {key: 'eyes', em: '👀'}
        ];

        // Cache local de votos del usuario (para saber si ya votó)
        let misVotos = JSON.parse(localStorage.getItem('nbapp_votos') || '{}');

        function shareMove(texto, plataforma, timestamp) {
            const siteUrl = "https://topdatanba1.github.io/nbapp/";
            const textoLimpio = texto.replace(/<[^>]*>/g, '');
            
            // Registrar share en Firebase
            const nid = notifId(timestamp);
            const jugador = document.querySelector(`[data-nid="${nid}"]`)?.dataset?.player;
            if (jugador) {
                const jugadorKey = jugador.replace(/[.#$\[\]\/]/g, '_');
                db.ref(`shares/${nid}/${plataforma}`).transaction(c => (c || 0) + 1);
                db.ref(`jugadores/${jugadorKey}/shares_${plataforma}`).transaction(c => (c || 0) + 1);
            }
            
            const msg = textoLimpio + '\n📊 ' + siteUrl;
            
            switch(plataforma) {
                case 'x':
                    window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(msg)}`, '_blank');
                    break;
                case 'whatsapp':
                    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
                    break;
                case 'facebook':
                    window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(siteUrl)}&hashtag=${encodeURIComponent('#NBA')}`, '_blank');
                    break;
                case 'telegram':
                    window.open(`https://t.me/share/url?url=${encodeURIComponent(siteUrl)}&text=${encodeURIComponent(textoLimpio)}`, '_blank');
                    break;
                case 'reddit':
                    window.open(`https://reddit.com/submit?url=${encodeURIComponent(siteUrl)}&title=${encodeURIComponent(textoLimpio)}`, '_blank');
                    break;
                case 'copy':
                    navigator.clipboard.writeText(msg).then(() => {
                        const btn = event.target.closest('.share-btn');
                        btn.classList.add('copied');
                        setTimeout(() => btn.classList.remove('copied'), 1500);
                    });
                    break;
            }
        }

        // === EXTRAER JUGADOR PRINCIPAL DEL MENSAJE ===
        function extraerJugador(texto) {
            // El jugador principal es el primer nombre en negrita o al inicio del texto
            const limpio = texto.replace(/<[^>]*>/g, '');
            // Patrón: nombre al inicio hasta el primer paréntesis o "today" o "has" o "becomes"
            const match = limpio.match(/^([A-Z][a-zA-Z'.]+(?:\s+[A-Z][a-zA-Z'.]+)*(?:\s+(?:Jr\.|Sr\.|II|III|IV))?)/);
            return match ? match[1].trim() : null;
        }

        // === GENERAR ID ÚNICO PARA CADA NOTIFICACIÓN ===
        function notifId(timestamp) {
            return 'n_' + timestamp;
        }

        // === VOTAR EMOJI ===
        function votarEmoji(timestamp, emojiKey) {
            const nid = notifId(timestamp);
            const jugador = document.querySelector(`[data-nid="${nid}"]`)?.dataset?.player;
            if (!jugador) return;
            
            // Comprobar si ya votó este emoji en esta notificación
            const votoKey = `${nid}_${emojiKey}`;
            if (misVotos[votoKey]) return; // Ya votó
            
            // Marcar como votado localmente
            misVotos[votoKey] = true;
            localStorage.setItem('nbapp_votos', JSON.stringify(misVotos));
            
            // Sanitizar nombre jugador para Firebase (no permite . # $ [ ] /)
            const jugadorKey = jugador.replace(/[.#$\[\]\/]/g, '_');
            
            // Incrementar en Firebase: votos por notificación
            const refNotif = db.ref(`votos/${nid}/${emojiKey}`);
            refNotif.transaction(c => (c || 0) + 1);
            
            // Incrementar en Firebase: totales por jugador
            const refJugador = db.ref(`jugadores/${jugadorKey}/${emojiKey}`);
            refJugador.transaction(c => (c || 0) + 1);
            
            // Actualizar UI inmediatamente
            const btn = document.querySelector(`[data-nid="${nid}"] .emoji-btn[data-emoji="${emojiKey}"]`);
            if (btn) {
                btn.classList.add('voted');
                const countEl = btn.querySelector('.emoji-count');
                countEl.textContent = parseInt(countEl.textContent || '0') + 1;
            }
        }

        // === CARGAR CONTEOS DE FIREBASE ===
        function cargarConteos(timestamp) {
            const nid = notifId(timestamp);
            const ref = db.ref(`votos/${nid}`);
            ref.once('value').then(snap => {
                const data = snap.val() || {};
                emojiList.forEach(e => {
                    const btn = document.querySelector(`[data-nid="${nid}"] .emoji-btn[data-emoji="${e.key}"]`);
                    if (btn) {
                        const count = data[e.key] || 0;
                        btn.querySelector('.emoji-count').textContent = count > 0 ? count : '';
                        // Marcar si ya votó
                        if (misVotos[`${nid}_${e.key}`]) btn.classList.add('voted');
                    }
                });
            });
        }

        function makeFooter(texto, cuando, timestamp) {
            const t = texto.replace(/'/g, "\\'").replace(/"/g, '&quot;');
            const jugador = extraerJugador(texto) || '';
            const jugadorSafe = jugador.replace(/'/g, "\\'");
            const nid = notifId(timestamp);
            
            const shareBtns = [
                {net:'x', icon: shareIcons.x, title:'X'},
                {net:'whatsapp', icon: shareIcons.whatsapp, title:'WhatsApp'},
                {net:'facebook', icon: shareIcons.facebook, title:'Facebook'},
                {net:'telegram', icon: shareIcons.telegram, title:'Telegram'},
                {net:'reddit', icon: shareIcons.reddit, title:'Reddit'},
                {net:'copy', icon: shareIcons.copy, title:'Copy'}
            ].map(s => `<button class="share-btn" data-net="${s.net}" onclick="shareMove('${t}','${s.net}',${timestamp})" title="${s.title}">${s.icon}</button>`).join('');
            
            const emojiBtns = emojiList.map(e => 
                `<button class="emoji-btn" data-emoji="${e.key}" onclick="votarEmoji(${timestamp},'${e.key}')"><span class="em">${e.em}</span><span class="emoji-count"></span></button>`
            ).join('');
            
            return `<div class="move-footer" data-nid="${nid}" data-player="${jugadorSafe}">
                <div class="emoji-bar">${emojiBtns}</div>
                <span class="foot-sep">│</span>
                <div class="share-btns">${shareBtns}</div>
            </div>`;
        }

        // LATEST MOVES CON FOTOS + TIEMPO
        function updateMoves() {
            const list = document.getElementById('moves-list');
            if (!list) return;

            fetch('data.json?v=' + new Date().getTime())
                .then(r => r.json())
                .then(data => {
                    const notis = (data.notificaciones || []).reverse();

                    list.innerHTML = notis.map(n => {
                        const texto = n.texto || "";
                        const fotos = Array.isArray(n.foto) ? n.foto : (n.foto ? [n.foto] : []);
                        const cuando = n.timestamp ? timeAgo(n.timestamp) : "";

                        // SIN FOTOS → solo texto
                        if (fotos.length === 0) {
                            return `
                                <div class="move-item">
                                    <div class="move-text">${texto} <span class="move-time">(${cuando})</span></div>
                                    ${makeFooter(texto, cuando, n.timestamp)}
                                </div>`;
                        }

                        // 1 FOTO → ocupa todo
                        if (fotos.length === 1) {
                            return `
                                <div class="move-item">
                                    <div class="collage c1">
                                        <img src="${fotos[0]}" />
                                    </div>
                                    <div class="move-text">${texto} <span class="move-time">(${cuando})</span></div>
                                    ${makeFooter(texto, cuando, n.timestamp)}
                                </div>`;
                        }

                        // 2 FOTOS → mitad / mitad
                        if (fotos.length === 2) {
                            return `
                                <div class="move-item">
                                    <div class="collage c2">
                                        <img src="${fotos[0]}" />
                                        <img src="${fotos[1]}" />
                                    </div>
                                    <div class="move-text">${texto} <span class="move-time">(${cuando})</span></div>
                                    ${makeFooter(texto, cuando, n.timestamp)}
                                </div>`;
                        }

                        // 3 FOTOS → 1 a la izquierda, 2 a la derecha
                        if (fotos.length === 3) {
                            return `
                                <div class="move-item">
                                    <div class="collage c3">
                                        <div class="left"><img src="${fotos[0]}" /></div>
                                        <div class="right">
                                            <img src="${fotos[1]}" />
                                            <img src="${fotos[2]}" />
                                        </div>
                                    </div>
                                    <div class="move-text">${texto} <span class="move-time">(${cuando})</span></div>
                                    ${makeFooter(texto, cuando, n.timestamp)}
                                </div>`;
                        }

                        // 4 FOTOS → grid 2x2
                        return `
                            <div class="move-item">
                                <div class="collage c4">
                                    ${fotos.slice(0,4).map(f=>`<img src="${f}" />`).join("")}
                                </div>
                                <div class="move-text">${texto} <span class="move-time">(${cuando})</span></div>
                                ${makeFooter(texto, cuando, n.timestamp)}
                            </div>`;
                    }).join('');
                    
                    // Cargar conteos de Firebase para cada notificación
                    notis.forEach(n => {
                        if (n.timestamp) cargarConteos(n.timestamp);
                    });
                })
                .catch(err => {
                    console.error(err);
                    list.innerHTML = '<div style="text-align:center;color:#888;padding:50px;">Waiting for tonight\'s action...</div>';
                });
        }      

        function getPlayerId(name) {
            const ids = {
                "LeBron James": 2544, "Stephen Curry": 201939, "Kevin Love": 201567, "Al Horford": 201143,
                "Luka Doncic": 1629029, "Jayson Tatum": 1628369, "Draymond Green": 203110, "Trae Young": 1629027,
                "De'Aaron Fox": 1628368, "Harrison Barnes": 203084, "Tobias Harris": 202699, "Kentavious Caldwell-Pope": 203484,
                "Marcus Smart": 203935, "Kristaps Porzingis": 204001, "Jusuf Nurkic": 203994, "Buddy Hield": 1627741,
                "Duncan Robinson": 1629130, "Jaylen Brown": 1627759, "Anfernee Simons": 1629014, "Derrick White": 1628401,
                "Michael Porter Jr.": 1629008
            };
            return ids[name] || 0;
        }

        setInterval(() => {
            if (document.getElementById('telegram').classList.contains('active')) updateMoves();
            if (document.getElementById('live').classList.contains('active')) updatePage();
        }, 25000);

        updatePage();
        updateMoves();
    </script>

            }
            
            // ✅ SI NO ESTÁ DESHABILITADO, CARGAR FILTROS GUARDADOS
            disableBtn.classList.remove('active');
            
            // Resetear todo a inactivo primero
            overlay.querySelectorAll('.filter-buttons button').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Recorrer cada grupo de filtros
            overlay.querySelectorAll('.filter-buttons').forEach(group => {
                const key = group.dataset.tag; // 'stat', 'team', 'alert', 'ranking'
                const savedValue = tags[key];
                
                console.log(`  Grupo ${key}: "${savedValue}"`);
                
                if(!savedValue || savedValue === 'ALL'){
                    // Si no hay tag guardado o es "ALL", activar el botón "ALL"
                    const allBtn = group.querySelector('[data-value="ALL"]');
                    if(allBtn) allBtn.classList.add('active');
                } else {
                    // Si hay valores guardados, activarlos
                    const values = savedValue.split(',');
                    values.forEach(val => {
                        // Buscar por data-value o por textContent
                        const btn = group.querySelector(`button[data-value="${val}"]`) || 
                                   [...group.querySelectorAll('button')].find(b => b.textContent.trim() === val);
                        if(btn){
                            btn.classList.add('active');
                            console.log(`    ✅ Activado: ${val}`);
                        } else {
                            console.log(`    ⚠️ No encontrado: ${val}`);
                        }
                    });
                }
            });
            
        } catch(error) {
            console.error("❌ Error cargando tags:", error);
            // Si falla, poner todo en "ALL" por defecto
            overlay.querySelectorAll('.filter-buttons').forEach(group=>{
                group.querySelectorAll('button').forEach(btn=>{
                    if(btn.dataset.value === 'ALL') btn.classList.add('active');
                    else btn.classList.remove('active');
                });
            });
        }
    });
}

function closeFilters(){
    document.getElementById('notif-overlay').classList.add('hidden');
}
</script>   
<script>
document.querySelectorAll('.filter-buttons').forEach(group=>{
    const isExclusive = ['alert','ranking'].includes(group.dataset.tag);

    group.querySelectorAll('button').forEach(btn=>{
        btn.addEventListener('click',()=>{
            // ✅ Al pulsar cualquier filtro, desactivar "disable" y restaurar "ALL"
            const disableBtn = document.querySelector('.disable-btn');
            
            // Si "disable" está activo, restaurar todos los "ALL"
            if(disableBtn.classList.contains('active')){
                disableBtn.classList.remove('active');
                
                // ✅ ACTIVAR TODOS LOS "ALL" DE TODOS LOS GRUPOS
                document.querySelectorAll('.filter-buttons').forEach(g=>{
                    g.querySelectorAll('button').forEach(b=>{
                        if(b.dataset.value === 'ALL'){
                            b.classList.add('active');
                        } else {
                            b.classList.remove('active');
                        }
                    });
                });
                
                // Borrar tag de disabled en OneSignal
                OneSignalDeferred.push(async function(OneSignal){
                    await OneSignal.User.removeTag('disabled');
                });
            }
            
            // ✅ LÓGICA NORMAL DE CLICK (igual que antes)
            if(btn.dataset.value === 'ALL'){
                group.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                return;
            }

            group.querySelector('[data-value="ALL"]').classList.remove('active');

            if(isExclusive){
                group.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
            }else{
                btn.classList.toggle('active');
            }
        });
    });
});
</script>
<script>
async function saveFilters(){
    const tags = {};

    document.querySelectorAll('.filter-buttons').forEach(group=>{
        const key = group.dataset.tag;
        const values = [...group.querySelectorAll('button.active')]
            .map(b=>b.dataset.value || b.textContent)
            .filter(v=>v!=='ALL');

        if(values.length){
            tags[key] = values.join(',');
        }
    });

    OneSignalDeferred.push(async function(OneSignal){
        await OneSignal.User.addTags(tags);
        alert('Preferences saved ✔');
    });
    
    // ✅ CERRAR EL PANEL DESPUÉS DEL ALERT
    closeFilters();
}

function disableNotifications(){
    // activar visualmente el botón
    const disableBtn = document.querySelector('.disable-btn');
    disableBtn.classList.add('active');

    // apagar TODOS los filtros
    document.querySelectorAll('.filter-buttons button')
        .forEach(b => b.classList.remove('active'));

    // mandar tag a OneSignal
    OneSignalDeferred.push(async function(OneSignal){
        await OneSignal.User.addTags({disabled:'true'});
    });
}
</script>
<script>
// ✅ VERIFICAR INICIALIZACIÓN DE ONESIGNAL
OneSignalDeferred.push(async function(OneSignal) {
    console.log("✅ OneSignal inicializado correctamente");
    
    // Mostrar ID del usuario
    const userId = await OneSignal.User.getExternalId() || "Sin ID externo";
    const oneSignalId = await OneSignal.User.PushSubscription.id;
    console.log("👤 OneSignal User ID:", oneSignalId);
    console.log("🔗 External ID:", userId);
    
    // Verificar suscripción
    const isSubscribed = await OneSignal.User.PushSubscription.optedIn;
    console.log("🔔 ¿Suscrito a notificaciones?", isSubscribed);
    
    // Mostrar tags actuales
    const tags = await OneSignal.User.getTags();
    console.log("🏷️ Tags actuales:", tags);
    
    // Pedir permisos si no los tiene
    const permission = await OneSignal.Notifications.permission;
    console.log("🔐 Permisos de notificaciones:", permission);
    
    if(permission === 'default'){
        console.log("⚠️ Pidiendo permisos...");
        const granted = await OneSignal.Notifications.requestPermission();
        if(granted){
            console.log("✅ Permisos otorgados");
        } else {
            console.log("❌ Permisos denegados");
        }
    }
});
</script>
