    <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
        // === MAIN TABS (Global / Teams) ===
        function openMainTab(tabName) {
            document.querySelectorAll('.main-tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.main-tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            document.querySelector(`.main-tab-btn[onclick="openMainTab('${tabName}')"]`).classList.add('active');
            
            if (tabName === 'teams') {
                updateTeamsMoves();
            } else if (tabName === 'topmoves') {
                updateTopMoves();
            } else {
                updateMoves();
            }
        }

        // === SUB TABS GLOBAL ===
        function openTab(tabName) {
            document.querySelectorAll('#global .tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('#global .tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            document.querySelector(`#global button[onclick="openTab('${tabName}')"]`).classList.add('active');
            if (tabName === 'live') updatePage();
            if (tabName === 'telegram') updateMoves();
        }

        // === SUB TABS TEAMS ===
        function openTabTeams(tabName) {
            document.querySelectorAll('.tab-content-teams').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('#teams .tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            document.querySelector(`#teams button[onclick="openTabTeams('${tabName}')"]`).classList.add('active');
            if (tabName === 'teams-moves') updateTeamsMoves();
            if (tabName === 'teams-live') updateTeamsPage();
        }

        const statNames = {pts:"NBA All-Time Points",trb:"NBA All-Time Rebounds",ast:"NBA All-Time Assists",stl:"NBA All-Time Steals",blk:"NBA All-Time Blocks",fg3:"NBA All-Time Three-Pointers",g:"NBA All-Time Games Played"};
        
        const teamFullNames = {
            'ATL':'Atlanta Hawks','BOS':'Boston Celtics','NJN':'Brooklyn Nets','CHA':'Charlotte Hornets',
            'CHI':'Chicago Bulls','CLE':'Cleveland Cavaliers','DAL':'Dallas Mavericks','DEN':'Denver Nuggets',
            'DET':'Detroit Pistons','GSW':'Golden State Warriors','HOU':'Houston Rockets','IND':'Indiana Pacers',
            'LAC':'LA Clippers','LAL':'LA Lakers','MEM':'Memphis Grizzlies','MIA':'Miami Heat',
            'MIL':'Milwaukee Bucks','MIN':'Minnesota Timberwolves','NOH':'New Orleans Pelicans','NYK':'New York Knicks',
            'OKC':'Oklahoma City Thunder','ORL':'Orlando Magic','PHI':'Philadelphia 76ers','PHO':'Phoenix Suns',
            'POR':'Portland Trail Blazers','SAC':'Sacramento Kings','SAS':'San Antonio Spurs','TOR':'Toronto Raptors',
            'UTA':'Utah Jazz','WAS':'Washington Wizards'
        };

        function getTimes() {
            const now = new Date();
            const cest = now.toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'Europe/Paris'});
            const est = now.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true,timeZone:'America/New_York'});
            return {cest, est};
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const filter = this.getAttribute('data-filter');
                if (filter === 'all') {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                } else {
                    document.querySelector('[data-filter="all"]').classList.remove('active');
                    if (filter === 'top25') document.querySelector('[data-filter="top100"]')?.classList.remove('active');
                    if (filter === 'top100') document.querySelector('[data-filter="top25"]')?.classList.remove('active');
                    this.classList.toggle('active');
                }
                updatePage();
            });
        });

        // Event listeners para filtros de Teams (mismo patrón que Global)
        document.querySelectorAll('.filter-btn-teams').forEach(btn => {
            btn.addEventListener('click', function() {
                const filter = this.getAttribute('data-filter-teams');
                if (filter === 'all') {
                    document.querySelectorAll('.filter-btn-teams').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                } else {
                    document.querySelector('[data-filter-teams="all"]').classList.remove('active');
                    this.classList.toggle('active');
                }
                updateTeamsPage();
            });
        });

        function getTeamsFilters() {
            const teamSelect = document.getElementById('team-select');
            return {
                all: document.querySelector('[data-filter-teams="all"]')?.classList.contains('active'),
                top10: document.querySelector('[data-filter-teams="top10"]')?.classList.contains('active'),
                team: teamSelect ? teamSelect.value : 'all',
                playing: document.querySelector('[data-filter-teams="playing"]')?.classList.contains('active'),
                almost: document.querySelector('[data-filter-teams="almost"]')?.classList.contains('active')
            };
        }

        function getActiveFilters() {
            return {
                top25: document.querySelector('[data-filter="top25"]').classList.contains('active'),
                top100: document.querySelector('[data-filter="top100"]').classList.contains('active'),
                playing: document.querySelector('[data-filter="playing"]').classList.contains('active'),
                almost: document.querySelector('[data-filter="almost"]').classList.contains('active'),
                all: document.querySelector('[data-filter="all"]').classList.contains('active')
            };
        }

        function updatePage() {
            const {cest, est} = getTimes();
            document.getElementById('clock-line').textContent = `${est} ET • ${cest} CEST`;

            fetch('data.json?v=' + new Date().getTime())
                .then(r => r.ok ? r.json() : Promise.reject())
                .then(data => {
                    const tablesDiv = document.getElementById('tables');
                    tablesDiv.innerHTML = '';
                    const filters = getActiveFilters();

                    // Orden fijo de estadísticas
                    const statOrder = ['pts', 'trb', 'ast', 'stl', 'blk', 'fg3', 'g'];
                    const sortedStats = Object.entries(data.tablas || {}).sort((a, b) => {
                        const idxA = statOrder.indexOf(a[0]) !== -1 ? statOrder.indexOf(a[0]) : 999;
                        const idxB = statOrder.indexOf(b[0]) !== -1 ? statOrder.indexOf(b[0]) : 999;
                        return idxA - idxB;
                    });

                    for (const [stat, tabla] of sortedStats) {
                        if (!tabla.length) continue;

                        let filtered = tabla.filter(row => {
                            const rank = row.Rank;
                            const gameStatus = String(row.game_status || '').toLowerCase();
                            const hoy = row.Hoy ?? 0;
                            const diff = (row.Diff ?? '').toString().trim() || '0';

                            // FILTROS EXISTENTES
                            if (filters.top25 && rank > 25) return false;
                            if (filters.top100 && !filters.top25 && rank > 100) return false;
                            if (filters.playing && gameStatus !== 'playing') return false;

                            // FILTRO "ALMOST" – CON EXCEPCIÓN PERFECTA PARA GAMES PLAYED
                            if (filters.almost) {
                                if (stat === 'g') {
                                    // En Games Played: solo los que NO han jugado hoy (Hoy=0) y están a 0 del de arriba
                                    if (hoy !== 0 || !['0'].includes(diff)) return false;
                                } else {
                                    const isPlayingOrNotStarted = (gameStatus === 'playing' || gameStatus === 'not_started');
                                    if (!isPlayingOrNotStarted) return false;
                                    
                                    // Detectar si es milestone (Antece es número) o rival (Antece es nombre)
                                    const antece = (row.Antece || '').toString().trim();
                                    const isMilestone = /^\d+$/.test(antece.replace(/,/g, ''));
                                    
                                    if (isMilestone) {
                                        // Milestone: SOLO diff=1 (diff=0 ya está conseguido)
                                        if (diff !== '1') return false;
                                    } else {
                                        // Rival: diff 0 (PTS permite 0,1,2)
                                        const near = (stat === 'pts') ? ['0','1','2'] : ['0'];
                                        if (!near.includes(diff)) return false;
                                    }
                                }
                            }

                            if (filters.all || (!filters.top25 && !filters.top100 && !filters.playing && !filters.almost)) return true;
                            return true;
                        });

                        if (filtered.length === 0) continue;

                        const card = document.createElement('div'); card.className = 'card';
                        card.innerHTML = `<h2>${statNames[stat]}</h2><table><thead><tr><th>Rank</th><th>Player</th><th>Team</th><th>Today</th><th>Total</th><th>Diff</th><th>Ahead Of</th></tr></thead><tbody></tbody></table>`;
                        const tbody = card.querySelector('tbody');

                        filtered.forEach(row => {
                            const hoy = row.Hoy ?? 0;
                            const diff = (row.Diff ?? '').toString().trim() || '0';
                            const gameStatus = String(row.game_status || '').toLowerCase();
                            const isInactive = (gameStatus === 'inactive');

                            const isPoints = stat === 'pts';
                            const isGames = stat === 'g';
                            const near = isPoints ? ['0','1','2','3'] : ['0','1'];
                            const mustBlinkNormal = (gameStatus === 'playing' || gameStatus === 'not_started') && near.includes(diff) && !isInactive;
                            const mustBlinkGames = isGames && (gameStatus === 'playing' || gameStatus === 'not_started') && hoy === 0 && near.includes(diff);
                            const mustBlink = isGames ? mustBlinkGames : mustBlinkNormal;

                            let todayStyle = '';
                            if (isInactive) todayStyle = 'color:#ff5555';             // rojo
                            else if (gameStatus === 'finished') todayStyle = 'color:white';
                            else if (gameStatus === 'playing') todayStyle = 'color:#ffaa00;font-weight:900;text-shadow:0 0 12px #ffaa00';
                            else todayStyle = 'color:#888';                           // not_started

                            const tr = document.createElement('tr');
                            tr.innerHTML = `
                                <td class="rank">${row.Rank}</td>
                                <td class="player">${row.Nombre}</td>
                                <td class="team">${row.Team}</td>
                                <td class="today" style="${todayStyle}">${hoy}</td>
                                <td class="number"><strong>${Number(row.Total).toLocaleString()}</strong></td>
                                <td class="diff number${mustBlink?' diff-blink':''}">${diff}</td>
                                <td>${row.Antece||'-'}</td>`;
                            tbody.appendChild(tr);
                        });
                        tablesDiv.appendChild(card);
                    }
                });
        }

        // Función para convertir timestamp → "5m ago", "2h ago", "now", etc.
        function timeAgo(ts) {
            const now = Date.now() / 1000;
            const diff = Math.floor(now - ts);

            if (diff < 60) return "now";
            if (diff < 3600) return Math.floor(diff / 60) + "m ago";
            if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
            return Math.floor(diff / 86400) + "d ago";
}    

        // === SHARE ICONS (SVG) ===
        // === EMOJIS CONFIG (6 emojis) ===
        const emojiList = [
            {key: 'thumbsup', em: '👍'},
            {key: 'muscle', em: '💪'},
            {key: 'eyes', em: '👀'},
            {key: 'goat', em: '🐐'},
            {key: 'target', em: '🎯'},
            {key: 'heart', em: '❤️'}
        ];

        // Cache local de votos del usuario (para saber si ya votó)
        let misVotos = JSON.parse(localStorage.getItem('nbapp_votos') || '{}');

        async function shareMove(texto, timestamp, btn) {
            const siteUrl = "https://topdatanba1.github.io/nbapp/";
            const textoLimpio = texto.replace(/<[^>]*>/g, '');
            const msg = textoLimpio + '\n📊 ' + siteUrl;
            
            // Registrar share en Firebase
            const nid = notifId(timestamp);
            const jugador = document.querySelector(`[data-nid="${nid}"]`)?.dataset?.player;
            if (jugador) {
                const jugadorKey = jugador.replace(/[.#$\[\]\/]/g, '_');
                db.ref(`shares/${nid}/total`).transaction(c => (c || 0) + 1);
                db.ref(`jugadores/${jugadorKey}/shares`).transaction(c => (c || 0) + 1);
            }
            
            // Web Share API (móvil y navegadores modernos)
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'NBA All-Time Rankings Update',
                        text: textoLimpio,
                        url: siteUrl
                    });
                    btn.classList.add('shared');
                    setTimeout(() => btn.classList.remove('shared'), 1500);
                } catch (err) {
                    // Usuario canceló o error - no hacer nada
                    if (err.name !== 'AbortError') {
                        // Fallback: copiar al portapapeles
                        await navigator.clipboard.writeText(msg);
                        btn.classList.add('shared');
                        setTimeout(() => btn.classList.remove('shared'), 1500);
                    }
                }
            } else {
                // Fallback para navegadores sin Web Share API: copiar al portapapeles
                await navigator.clipboard.writeText(msg);
                btn.classList.add('shared');
                setTimeout(() => btn.classList.remove('shared'), 1500);
            }
        }

        // === EXTRAER JUGADOR PRINCIPAL DEL MENSAJE ===
        function extraerJugador(texto) {
            // El jugador principal es el primer nombre en negrita o al inicio del texto
            const limpio = texto.replace(/<[^>]*>/g, '');
            // Patrón: nombre al inicio hasta el primer paréntesis o "today" o "has" o "becomes"
            const match = limpio.match(/^([A-Z][a-zA-Z'.]+(?:\s+[A-Z][a-zA-Z'.]+)*(?:\s+(?:Jr\.|Sr\.|II|III|IV))?)/);
            return match ? match[1].trim() : null;
        }

        // === GENERAR ID ÚNICO PARA CADA NOTIFICACIÓN ===
        function notifId(timestamp) {
            return 'n_' + timestamp;
        }

        // === VOTAR EMOJI ===
        function votarEmoji(timestamp, emojiKey) {
            const nid = notifId(timestamp);
            const jugador = document.querySelector(`[data-nid="${nid}"]`)?.dataset?.player;
            if (!jugador) return;
            
            // Comprobar si ya votó este emoji en esta notificación
            const votoKey = `${nid}_${emojiKey}`;
            if (misVotos[votoKey]) return; // Ya votó
            
            // Marcar como votado localmente
            misVotos[votoKey] = true;
            localStorage.setItem('nbapp_votos', JSON.stringify(misVotos));
            
            // Sanitizar nombre jugador para Firebase (no permite . # $ [ ] /)
            const jugadorKey = jugador.replace(/[.#$\[\]\/]/g, '_');
            
            // Incrementar en Firebase: votos por notificación
            const refNotif = db.ref(`votos/${nid}/${emojiKey}`);
            refNotif.transaction(c => (c || 0) + 1);
            
            // Incrementar en Firebase: totales por jugador
            const refJugador = db.ref(`jugadores/${jugadorKey}/${emojiKey}`);
            refJugador.transaction(c => (c || 0) + 1);
            
            // Actualizar UI inmediatamente
            const btn = document.querySelector(`[data-nid="${nid}"] .emoji-btn[data-emoji="${emojiKey}"]`);
            if (btn) {
                btn.classList.add('voted');
                const countEl = btn.querySelector('.emoji-count');
                countEl.textContent = parseInt(countEl.textContent || '0') + 1;
            }
        }

        // === CARGAR CONTEOS DE FIREBASE ===
        function cargarConteos(timestamp) {
            const nid = notifId(timestamp);
            const ref = db.ref(`votos/${nid}`);
            ref.once('value').then(snap => {
                const data = snap.val() || {};
                emojiList.forEach(e => {
                    const btn = document.querySelector(`[data-nid="${nid}"] .emoji-btn[data-emoji="${e.key}"]`);
                    if (btn) {
                        const count = data[e.key] || 0;
                        btn.querySelector('.emoji-count').textContent = count > 0 ? count : '';
                        // Marcar si ya votó
                        if (misVotos[`${nid}_${e.key}`]) btn.classList.add('voted');
                    }
                });
            });
        }

        function makeFooter(texto, cuando, timestamp) {
            const t = texto.replace(/'/g, "\\'").replace(/"/g, '&quot;');
            const jugador = extraerJugador(texto) || '';
            const jugadorSafe = jugador.replace(/'/g, "\\'");
            const nid = notifId(timestamp);
            
            // Un solo botón de compartir (icono de share)
            const shareIcon = `<svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>`;
            
            const emojiBtns = emojiList.map(e => 
                `<button class="emoji-btn" data-emoji="${e.key}" onclick="votarEmoji(${timestamp},'${e.key}')"><span class="em">${e.em}</span><span class="emoji-count"></span></button>`
            ).join('');
            
            return `<div class="move-footer" data-nid="${nid}" data-player="${jugadorSafe}">
                <div class="emoji-bar">${emojiBtns}</div>
                <span class="foot-sep">│</span>
                <button class="share-btn" onclick="shareMove('${t}',${timestamp},this)" title="Share">${shareIcon}</button>
            </div>`;
        }

        // LATEST MOVES CON FOTOS + TIEMPO
        function updateMoves() {
            const list = document.getElementById('moves-list');
            if (!list) return;

            fetch('data.json?v=' + new Date().getTime())
                .then(r => r.json())
                .then(data => {
                    const notis = (data.notificaciones || []).reverse();

                    list.innerHTML = notis.map(n => {
                        const texto = n.texto || "";
                        const fotos = Array.isArray(n.foto) ? n.foto : (n.foto ? [n.foto] : []);
                        const cuando = n.timestamp ? timeAgo(n.timestamp) : "";

                        // SIN FOTOS → solo texto
                        if (fotos.length === 0) {
                            return `
                                <div class="move-item">
                                    <div class="move-text">${texto} <span class="move-time">(${cuando})</span></div>
                                    ${makeFooter(texto, cuando, n.timestamp)}
                                </div>`;
                        }

                        // 1 FOTO → ocupa todo
                        if (fotos.length === 1) {
                            return `
                                <div class="move-item">
                                    <div class="collage c1">
                                        <img src="${fotos[0]}" />
                                    </div>
                                    <div class="move-text">${texto} <span class="move-time">(${cuando})</span></div>
                                    ${makeFooter(texto, cuando, n.timestamp)}
                                </div>`;
                        }

                        // 2 FOTOS → mitad / mitad
                        if (fotos.length === 2) {
                            return `
                                <div class="move-item">
                                    <div class="collage c2">
                                        <img src="${fotos[0]}" />
                                        <img src="${fotos[1]}" />
                                    </div>
                                    <div class="move-text">${texto} <span class="move-time">(${cuando})</span></div>
                                    ${makeFooter(texto, cuando, n.timestamp)}
                                </div>`;
                        }

                        // 3 FOTOS → 1 a la izquierda, 2 a la derecha
                        if (fotos.length === 3) {
                            return `
                                <div class="move-item">
                                    <div class="collage c3">
                                        <div class="left"><img src="${fotos[0]}" /></div>
                                        <div class="right">
                                            <img src="${fotos[1]}" />
                                            <img src="${fotos[2]}" />
                                        </div>
                                    </div>
                                    <div class="move-text">${texto} <span class="move-time">(${cuando})</span></div>
                                    ${makeFooter(texto, cuando, n.timestamp)}
                                </div>`;
                        }

                        // 4 FOTOS → grid 2x2
                        return `
                            <div class="move-item">
                                <div class="collage c4">
                                    ${fotos.slice(0,4).map(f=>`<img src="${f}" />`).join("")}
                                </div>
                                <div class="move-text">${texto} <span class="move-time">(${cuando})</span></div>
                                ${makeFooter(texto, cuando, n.timestamp)}
                            </div>`;
                    }).join('');
                    
                    // Cargar conteos de Firebase para cada notificación
                    notis.forEach(n => {
                        if (n.timestamp) cargarConteos(n.timestamp);
                    });
                })
                .catch(err => {
                    console.error(err);
                    list.innerHTML = '<div style="text-align:center;color:#888;padding:50px;">Waiting for tonight\'s action...</div>';
                });
        }

        // === UPDATE TEAMS MOVES ===
        function updateTeamsMoves() {
            const list = document.getElementById('teams-moves-list');
            if (!list) return;

        // === UPDATE TEAMS LIVE RANKINGS ===
        function updateTeamsPage() {
            const tablesDiv = document.getElementById('teams-tables');
            if (!tablesDiv) return;

            fetch('data.json?v=' + new Date().getTime())
                .then(r => r.json())
                .then(data => {
                    const teamsData = data.tablas_teams || {};
                    const filters = getTeamsFilters();
                    
                    if (Object.keys(teamsData).length === 0) {
                        tablesDiv.innerHTML = '<div style="text-align:center;color:#888;padding:50px;">No active players in team rankings today...</div>';
                        return;
                    }

                    tablesDiv.innerHTML = '';
                    
                    // Ordenar equipos alfabéticamente
                    const sortedTeams = Object.entries(teamsData).sort((a, b) => {
                        const nameA = teamFullNames[a[0]] || a[0];
                        const nameB = teamFullNames[b[0]] || b[0];
                        return nameA.localeCompare(nameB);
                    });
                    
                    // Agrupar por equipo
                    sortedTeams.forEach(([team, rows]) => {
                        if (!rows || rows.length === 0) return;
                        
                        // Filtro por equipo
                        if (filters.team !== 'all' && team !== filters.team) return;
                        
                        // Filtrar filas
                        let filteredRows = rows.filter(row => {
                            if (filters.top10 && row.Rank > 10) return false;
                            if (filters.playing && row.game_status !== 'playing') return false;
                            if (filters.almost) {
                                // Excluir jugadores con Hoy=1 en stat G (ya jugaron, no pueden adelantar más hoy)
                                const stat = row.Stat || '';
                                const hoy = row.Hoy ?? 0;
                                if (stat === 'G' && hoy === 1) return false;
                                
                                // Manejar diff: puede ser número, string numérico, o string vacío
                                let diffRaw = row.Diff;
                                let diff = 999;
                                if (diffRaw !== '' && diffRaw !== null && diffRaw !== undefined) {
                                    const parsed = parseInt(diffRaw, 10);
                                    if (!isNaN(parsed)) diff = parsed;
                                }
                                
                                // Detectar si es milestone (Antece es número) o rival (Antece es nombre)
                                const antece = (row.Antece || '').toString().trim();
                                const isMilestone = /^\d+$/.test(antece.replace(/,/g, ''));
                                
                                if (isMilestone) {
                                    // Milestone: SOLO diff=1 (diff=0 ya está conseguido)
                                    if (diff !== 1) return false;
                                } else {
                                    // Rival: diff 0 (PTS permite 0,1,2)
                                    const threshold = (stat === 'PTS') ? 2 : 0;
                                    if (diff > threshold) return false;
                                }
                                return true;
                            }
                            return true;
                        });
                        
                        if (filteredRows.length === 0) return;
                        
                        const card = document.createElement('div');
                        card.className = 'stat-card';
                        
                        const teamName = teamFullNames[team] || team;
                        card.innerHTML = `
                            <div class="stat-header">${teamName}</div>
                            <table class="stat-table">
                                <thead>
                                    <tr>
                                        <th class="rank">#</th>
                                        <th class="player">Player</th>
                                        <th class="stat-col">Stat</th>
                                        <th class="today">Today</th>
                                        <th class="number">Total</th>
                                        <th class="diff">Diff</th>
                                        <th>Next</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>`;
                        
                        const tbody = card.querySelector('tbody');
                        
                        // Ordenar filas por Stat para agruparlas
                        const statOrder = ['PTS', 'REB', 'AST', 'STL', 'BLK', '3PM', 'G'];
                        filteredRows.sort((a, b) => {
                            const idxA = statOrder.indexOf(a.Stat) !== -1 ? statOrder.indexOf(a.Stat) : 999;
                            const idxB = statOrder.indexOf(b.Stat) !== -1 ? statOrder.indexOf(b.Stat) : 999;
                            if (idxA !== idxB) return idxA - idxB;
                            return a.Rank - b.Rank;
                        });
                        
                        // Rastrear cambios de stat para alternar fondo
                        let currentStat = null;
                        let statGroupIndex = 0;
                        
                        filteredRows.forEach(row => {
                            // Detectar cambio de stat para alternar fondo
                            if (row.Stat !== currentStat) {
                                currentStat = row.Stat;
                                statGroupIndex++;
                            }
                            const isAltGroup = (statGroupIndex % 2 === 0);
                            
                            const hoy = row.Hoy ?? 0;
                            const diff = (row.Diff ?? '').toString().trim() || '0';
                            const gameStatus = String(row.game_status || '').toLowerCase();
                            const statAbbr = row.Stat || '';
                            const isInactive = (gameStatus === 'inactive');
                            
                            // PTS: parpadea con diff 0,1,2 | otras: parpadea con diff 0
                            const isPoints = (statAbbr === 'PTS');
                            const nearThreshold = isPoints ? ['0','1','2'] : ['0'];
                            const mustBlink = (gameStatus === 'playing' || gameStatus === 'not_started') && nearThreshold.includes(diff) && !isInactive;

                            let todayStyle = '';
                            if (isInactive) todayStyle = 'color:#ff5555';  // rojo para inactivos
                            else if (gameStatus === 'finished') todayStyle = 'color:white';
                            else if (gameStatus === 'playing') todayStyle = 'color:#ffaa00;font-weight:900;text-shadow:0 0 12px #ffaa00';
                            else todayStyle = 'color:#888';

                            const tr = document.createElement('tr');
                            // Aplicar fondo alternado por grupo de stat
                            if (isAltGroup) {
                                tr.style.backgroundColor = 'rgba(255,255,255,0.08)';
                            }
                            tr.innerHTML = `
                                <td class="rank">${row.Rank}</td>
                                <td class="player">${row.Nombre}</td>
                                <td class="stat-col">${statAbbr}</td>
                                <td class="today" style="${todayStyle}">${hoy}</td>
                                <td class="number"><strong>${Number(row.Total).toLocaleString()}</strong></td>
                                <td class="diff number${mustBlink?' diff-blink':''}">${diff}</td>
                                <td>${row.Antece||'-'}</td>`;
                            tbody.appendChild(tr);
                        });
                        
                        tablesDiv.appendChild(card);
                    });
                    
                    if (tablesDiv.innerHTML === '') {
                        tablesDiv.innerHTML = '<div style="text-align:center;color:#888;padding:50px;">No players match the current filters...</div>';
                    }
                })
                .catch(err => {
                    console.error(err);
                    tablesDiv.innerHTML = '<div style="text-align:center;color:#888;padding:50px;">Error loading team rankings...</div>';
                });
        }

    document.querySelector(`.scope-tab[data-scope="${scope}"]`).classList.add('active');

}

async function openFilters(){
    const overlay = document.getElementById('notif-overlay');
    overlay.classList.remove('hidden');

    // ✅ CARGAR TAGS DESDE ONESIGNAL
    OneSignalDeferred.push(async function(OneSignal){
        try {
            const tags = await OneSignal.User.getTags();
            console.log("📊 Tags cargados desde OneSignal:", tags);
            
            const disableBtn = overlay.querySelector('.disable-btn');
            
            // Si está deshabilitado
            if(tags.disabled === 'true'){
                console.log("🔕 Notificaciones deshabilitadas");
                disableBtn.classList.add('active');
                // Apagar todos los filtros
                overlay.querySelectorAll('.filter-buttons button').forEach(b => {
                    b.classList.remove('active');

                return;

            // ✅ SI NO ESTÁ DESHABILITADO, CARGAR FILTROS GUARDADOS
            disableBtn.classList.remove('active');
            
            // Resetear todo a inactivo primero
            overlay.querySelectorAll('.filter-buttons button').forEach(btn => {
                btn.classList.remove('active');

            // Recorrer cada grupo de filtros
            overlay.querySelectorAll('.filter-buttons').forEach(group => {
                const key = group.dataset.tag; // 'stat', 'team', 'alert', 'ranking'
                const savedValue = tags[key];
                
                console.log(`  Grupo ${key}: "${savedValue}"`);
                
                if(!savedValue || savedValue === 'ALL'){
                    // Si no hay tag guardado o es "ALL", activar el botón "ALL"
                    const allBtn = group.querySelector('[data-value="ALL"]');
                    if(allBtn) allBtn.classList.add('active');
                } else {

                    const values = savedValue.split(',');
                    values.forEach(val => {
                        // Buscar por data-value o por textContent
                        const btn = group.querySelector(`button[data-value="${val}"]`) || 
                                   [...group.querySelectorAll('button')].find(b => b.textContent.trim() === val);
                        if(btn){

            overlay.querySelectorAll('.filter-buttons').forEach(group=>{
                group.querySelectorAll('button').forEach(btn=>{
                    if(btn.dataset.value === 'ALL') btn.classList.add('active');
                    else btn.classList.remove('active');
                });
            });
        }
    });
}

            // ✅ LÓGICA NORMAL DE CLICK

                group.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
            }else{
                btn.classList.toggle('active');
            }
        });
    });

        const activeButtons = [...group.querySelectorAll('button.active')];
        const values = activeButtons
            .map(b=>b.dataset.value || b.textContent)
            .filter(v=>v!=='ALL');

        // Si hay un botón ALL activo o no hay valores específicos, eliminar el tag
        const hasAllActive = activeButtons.some(b => (b.dataset.value || b.textContent) === 'ALL');
        
        if(hasAllActive || values.length === 0){
            tagsToRemove.push(key);
        } else {
            tags[key] = values.join(',');
        }
    });

    OneSignalDeferred.push(async function(OneSignal){
        // Primero eliminar los tags que deben ser ALL
        if(tagsToRemove.length > 0){
            await OneSignal.User.removeTags(tagsToRemove);
        }
        // Luego añadir los tags específicos
        if(Object.keys(tags).length > 0){
            await OneSignal.User.addTags(tags);
        }
        alert('Preferences saved ✔');
    });
    
    // ✅ CERRAR EL PANEL DESPUÉS DEL ALERT
    closeFilters();
}

function disableNotifications(){
    // activar visualmente el botón
    const disableBtn = document.querySelector('.disable-btn');

    document.querySelectorAll('.filter-buttons button')
        .forEach(b => b.classList.remove('active'));

    // mandar tag a OneSignal
    OneSignalDeferred.push(async function(OneSignal){
        await OneSignal.User.addTags({disabled:'true'});
    });
}

// === TOP MOVES ===
let topMovesData = null;

async function loadTopMovesData() {
    if (topMovesData) return topMovesData;
    try {
        const response = await fetch('notificaciones_historicas.json?t=' + Date.now());
        topMovesData = await response.json();
        return topMovesData;
    } catch (e) {
        console.error('Error loading top moves data:', e);
        return null;
    }
}

function extractRanking(text) {
    // Extraure el ranking del text de la notificació
    const patterns = [
        /ranked (\d+)(?:st|nd|rd|th)/i,
        /becomes the (\d+)(?:st|nd|rd|th)/i
    ];
    for (const pattern of patterns) {
        const match = text.match(pattern);
        if (match) return parseInt(match[1]);
    }
    return 9999; // Si no trobem ranking, posar al final
}

function extractStat(text) {
    // Extraure l'estadística del text
    const lowerText = text.toLowerCase();
    if (lowerText.includes('point')) return 'pts';
    if (lowerText.includes('rebound')) return 'trb';
    if (lowerText.includes('assist')) return 'ast';
    if (lowerText.includes('steal')) return 'stl';
    if (lowerText.includes('block')) return 'blk';
    if (lowerText.includes('three-pointer') || lowerText.includes('3-pointer')) return 'fg3';
    if (lowerText.includes('game')) return 'g';
    return 'other';
}

function extractPlayerName(text) {
    // Extraure nom del jugador (abans del primer parèntesi o "today")
    const match = text.match(/^(?:📢[^\s]*\s*)*(?:<b>)?([^(<]+)/);
    if (match) {
        return match[1].replace(/<\/?b>/g, '').trim();
    }
    return 'Unknown';
}

function filterByPeriod(notifications, period) {
    const now = new Date();
    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    
    // Calcular inici de la setmana (dilluns)
    const weekStart = new Date(todayStart);
    const dayOfWeek = weekStart.getDay();
    const diff = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
    weekStart.setDate(weekStart.getDate() - diff);
    
    // Calcular inici del mes
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    
    // Calcular inici de la temporada (octubre 2025)
    const seasonStart = new Date(2025, 9, 1); // Octubre 2025
    
    return notifications.filter(n => {
        const notifDate = new Date(n.timestamp * 1000);
        switch(period) {
            case 'today': return notifDate >= todayStart;
            case 'week': return notifDate >= weekStart;
            case 'month': return notifDate >= monthStart;
            case 'season': return notifDate >= seasonStart;
            default: return true;
        }
    });
}

async function updateTopMoves() {
    const data = await loadTopMovesData();
    if (!data) {
        document.getElementById('top-moves-list').innerHTML = '<p style="text-align:center;color:#888;">Error loading data</p>';
        return;
    }
    
    const period = document.getElementById('top-period').value;
    const type = document.getElementById('top-type').value;
    const stat = document.getElementById('top-stat').value;
    
    let allNotifications = [];
    
    // Combinar global i franchise segons filtre
    if (type === 'all' || type === 'global') {
        const globalNotifs = (data.global || []).map(n => ({...n, source: 'global'}));
        allNotifications = allNotifications.concat(globalNotifs);
    }
    if (type === 'all' || type === 'franchise') {
        const franchiseNotifs = (data.franchise || []).map(n => ({...n, source: 'franchise'}));
        allNotifications = allNotifications.concat(franchiseNotifs);
    }
    
    // Filtrar per període
    allNotifications = filterByPeriod(allNotifications, period);
    
    // Filtrar per estadística
    if (stat !== 'all') {
        allNotifications = allNotifications.filter(n => extractStat(n.texto) === stat);
    }
    
    // Extraure ranking i ordenar
    allNotifications = allNotifications.map(n => ({
        ...n,
        ranking: extractRanking(n.texto),
        statType: extractStat(n.texto),
        playerName: extractPlayerName(n.texto)
    }));
    
    // Ordenar per ranking (menor = millor)
    allNotifications.sort((a, b) => a.ranking - b.ranking);
    
    // Agafar top 5
    const top5 = allNotifications.slice(0, 5);
    
    // Renderitzar
    const container = document.getElementById('top-moves-list');
    
    if (top5.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#888;padding:20px;">No moves found for this filter</p>';
        return;
    }
    
    const statEmojis = {
        'pts': '🏀',
        'trb': '📊',
        'ast': '🎯',
        'stl': '🖐️',
        'blk': '🚫',
        'fg3': '🎯',
        'g': '📅'
    };
    
    container.innerHTML = top5.map((n, index) => {
        const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${index + 1}`;
        const statEmoji = statEmojis[n.statType] || '📈';
        const sourceLabel = n.source === 'franchise' ? `<span style="color:#ff4655;font-size:0.8em;">[${n.team || 'TEAM'}]</span>` : '<span style="color:#55ff55;font-size:0.8em;">[GLOBAL]</span>';
        const date = new Date(n.timestamp * 1000).toLocaleDateString('en-US', {month:'short', day:'numeric'});
        
        // Foto (només globals en tenen)
        const photoHtml = n.foto && n.foto.length > 0 
            ? `<div class="move-photos">${n.foto.map(f => `<img src="${f}" onerror="this.style.display='none'">`).join('')}</div>` 
            : '';
        
        return `
            <div class="move-item" style="position:relative;">
                <div style="position:absolute;top:10px;left:10px;font-size:1.5em;">${medal}</div>
                <div style="position:absolute;top:10px;right:10px;font-size:1.2em;">${statEmoji}</div>
                ${photoHtml}
                <div class="move-text" style="margin-top:${n.foto && n.foto.length > 0 ? '0' : '25px'};">
                    ${n.texto.replace(/<b>/g, '<strong>').replace(/<\/b>/g, '</strong>')}
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
                    ${sourceLabel}
                    <span class="move-time">${date}</span>
                </div>
            </div>
        `;
    }).join('');
}
