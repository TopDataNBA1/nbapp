name: Live Deploy
on:
  push:
    branches: [ main ]
    paths:
      - 'data_playoffs.json'
      - 'data.json'
      - 'index.html'
      - 'notificaciones_historicas*.json'
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Update files from main
        run: |
          git fetch origin main
          # Actualitzar fitxers de dades
          for f in data_playoffs.json data.json index.html notificaciones_historicas.json notificaciones_historicas_playoffs.json; do
            git checkout origin/main -- "$f" 2>/dev/null || true
          done
          # Copiar només collages nous (que no existeixen a gh-pages)
          mkdir -p collages
          git ls-tree -r --name-only origin/main -- collages/ | while read f; do
            fname=$(basename "$f")
            if [ ! -f "collages/$fname" ]; then
              git checkout origin/main -- "$f" 2>/dev/null || true
            fi
          done

      - name: Commit and push to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_playoffs.json data.json index.html notificaciones_historicas.json notificaciones_historicas_playoffs.json collages/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Deploy $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin gh-pages
