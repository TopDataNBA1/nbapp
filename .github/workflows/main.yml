name: Live Deploy Every Minute

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:   # ← ESTA LÍNEA ES LA QUE LO DESBLOQUEA MANUALMENTE
  push:                 # ← Y ESTA LO MANTIENE VIVO CON CADA PUSH
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./          # sirve desde la raíz
          force_orphan: true       # fuerza redeploy completo
          commit_message: "Live update $(date)"

