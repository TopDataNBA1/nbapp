name: Live Deploy Every Minute

on:
  schedule:
    - cron: '*/1 * * * *'     # cada minuto
  workflow_dispatch:         # para ejecutarlo manual cuando quieras

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./          # sirve desde la raíz
          force_orphan: true       # fuerza redeploy completo
          commit_message: "Live update $(date)"
