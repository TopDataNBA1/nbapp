name: Live Deploy Every Minute

on:
  # Eliminamos la línea 'schedule' para que SOLO se base en el 'push'
  # schedule:
  #   - cron: '*/1 * * * *'
  
  workflow_dispatch:  # ← Para ejecución manual (mantenemos)
  push:               # ← ESTA LÍNEA ES LA QUE HACE QUE SE EJECUTE CADA 30 SEGUNDOS
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          commit_message: "Live update $(date)"


